; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stick-c]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200

lib_deps = 
    m5stack/M5Unified @ ^0.2.10
    m5stack/M5GFX @ ^0.2.16
    marvinroger/AsyncMqttClient@^0.8.1
    bblanchon/ArduinoJson@^7.4.2
    mathieucarbou/ESPAsyncWebServer@^3.6.0
    mathieucarbou/AsyncTCP@^3.3.2

build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM

lib_ignore =
    WebServer

; [env:native] disabled — requires MinGW (g++) which is not available on this machine.
; All tests run on-device via the test_embedded environment (m5stick-c).